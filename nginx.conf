server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # --- SPA routing ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API proxy (clé injectée côté serveur) ---
    location /api/ {
        proxy_pass https://aerodatabox.p.rapidapi.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host aerodatabox.p.rapidapi.com;
        proxy_set_header X-RapidAPI-Key "${RAPIDAPI_KEY}";
        proxy_set_header X-RapidAPI-Host aerodatabox.p.rapidapi.com;
        proxy_set_header Accept application/json;

        # Ne pas transmettre les cookies/headers du client
        proxy_set_header Cookie "";
        proxy_set_header Authorization "";
    }

    # --- Cache assets statiques ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Compression ---
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
